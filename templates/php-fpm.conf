[$NEW_USER]
listen = /var/run/php/$pool.sock
listen.owner = $pool
listen.group = www-data
listen.mode = 0660
user = $pool
group = hosting
pm = dynamic
pm.max_children = 20
pm.start_servers = 3 
pm.min_spare_servers = 3
pm.max_spare_servers = 5
pm.max_requests = 500
chdir = /
php_admin_value[memory_limit]=512M
php_admin_value[session.save_path]=/var/www/$pool/tmp
php_admin_value[max_execution_time]=120
php_admin_value[open_basedir]="/var/www/$pool:/usr/bin:/tmp"
php_admin_value[date.timezone]="Australia/Sydney"
; php_admin_value[disable_functions]="eval, exec, passthru, shell_exec, system, proc_open, popen, show_source"
php_admin_value[expose_php]=off
php_flag[short_open_tag]=On
php_flag[magic_quotes_gpc]=Off
php_flag[magic_quotes_sybase]=Off
php_flag[magic_quotes_runtime]=Off
php_flag[register_globals]=Off
php_flag[session.auto_start]=Off
php_flag[suhosin.session.encrypt]=Off
php_value[upload_max_filesize]=64M
php_value[post_max_size]=64M
php_admin_value[upload_tmp_dir]=/var/www/$pool/uploads
php_admin_value[opcache.enable_cli]=1
php_admin_value[error_log] = /var/www/$pool/log/error_php-fpm.log
php_admin_flag[log_errors] = on
slowlog = /var/www/$pool/log/slow_php-fpm.log
request_slowlog_timeout = 3s
; don't use access log, too verbose
; access.log = /var/www/$pool/log/access_php-fpm.log

